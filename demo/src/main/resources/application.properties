spring.application.name=relay

# MongoDB Configuration
spring.data.mongodb.uri=mongodb://localhost:27017/relay_db

# Server Configuration
server.port=8080

# Ethereum / Web3j configuration (Ganache)
blockchain.rpc.url=http://127.0.0.1:7545
blockchain.private.key=REPLACE_WITH_GANACHE_ACCOUNT_PRIVATE_KEY
blockchain.nodeRegistry.address=REPLACE_NODE_REGISTRY_CONTRACT_ADDRESS
blockchain.reputationLedger.address=REPLACE_REPUTATION_LEDGER_CONTRACT_ADDRESS
